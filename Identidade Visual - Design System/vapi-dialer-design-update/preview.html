<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CallX — Preview Visual Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:#E8002D;--red2:#FF1744;--red-lo:rgba(232,0,45,0.18);--red-glow:rgba(232,0,45,0.45);
  --cyan:#00C2FF;--green:#00D68F;--yellow:#FFB800;--purple:#A855F7;
  --bg:#060608;--g1:rgba(232,0,45,0.12);--g2:rgba(0,194,255,0.07);--g3:rgba(168,85,247,0.07);
  --glass-bg:rgba(255,255,255,0.04);--glass-bg-2:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.09);
  --sidebar-bg:rgba(10,10,14,0.92);--topbar-bg:rgba(6,6,8,0.82);
  --text-1:#FFFFFF;--text-2:rgba(255,255,255,0.58);--text-3:rgba(255,255,255,0.28);
  --radius:18px;--radius-sm:10px;--radius-md:14px;
  --sidebar-w:242px;--ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#EEEEF3;--g1:rgba(232,0,45,0.07);--g2:rgba(0,194,255,0.05);--g3:rgba(168,85,247,0.05);
  --glass-bg:rgba(255,255,255,0.55);--glass-bg-2:rgba(255,255,255,0.72);
  --glass-border:rgba(0,0,0,0.08);
  --sidebar-bg:rgba(248,248,252,0.9);--topbar-bg:rgba(238,238,243,0.88);
  --text-1:#0A0A12;--text-2:rgba(10,10,18,0.55);--text-3:rgba(10,10,18,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
svg{display:block;flex-shrink:0}button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 10% 0%,var(--g1) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 20%,var(--g2) 0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 50% 100%,var(--g3) 0%,transparent 55%);
  animation:bgShift 18s ease-in-out infinite alternate}
@keyframes bgShift{0%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}

/* APP SHELL */
.app{display:flex;height:100vh;position:relative;z-index:1}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);backdrop-filter:blur(24px) saturate(180%);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;transition:width .28s var(--ease),min-width .28s var(--ease);overflow:hidden;position:relative;z-index:40}
.sidebar.collapsed{width:66px;min-width:66px}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(180deg,rgba(232,0,45,0.06) 0%,transparent 100%);pointer-events:none}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 14px;border-bottom:1px solid var(--glass-border);min-height:64px}
.logo-svg-wrap{flex:1;overflow:hidden;min-width:0;color:#fff;display:flex;align-items:center;transition:opacity .25s,max-width .28s}
.logo-svg-wrap svg{width:96px;height:auto;flex-shrink:0}
.sidebar.collapsed .logo-svg-wrap{opacity:0;max-width:0;pointer-events:none}
[data-theme="light"] .logo-svg-wrap{color:#0A0A12}
.sidebar-toggle{flex-shrink:0;width:32px;height:32px;border-radius:9px;background:var(--glass-bg);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all .15s}
.sidebar-toggle:hover{background:var(--red-lo);border-color:rgba(232,0,45,0.3);color:var(--red)}
.sidebar.collapsed .sidebar-toggle{margin:0 auto}
.org-selector{margin:12px 10px 8px;padding:10px 12px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);display:flex;align-items:center;gap:10px;cursor:pointer;overflow:hidden;white-space:nowrap}
.org-icon{width:28px;height:28px;border-radius:8px;background:var(--red-lo);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.org-name{font-size:13px;font-weight:600;color:var(--text-1);flex:1;overflow:hidden;text-overflow:ellipsis}
.sidebar.collapsed .org-name,.sidebar.collapsed .org-arrow{display:none}
.nav-scroll{overflow-y:auto;flex:1;display:flex;flex-direction:column}
.nav-section{padding:6px 8px}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--text-3);text-transform:uppercase;padding:8px 8px 4px;white-space:nowrap;transition:opacity .25s}
.sidebar.collapsed .nav-label{opacity:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-md);color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;overflow:hidden;transition:all .18s;text-decoration:none}
.nav-item:hover{background:var(--glass-bg-2);color:var(--text-1)}
.nav-item.active{background:linear-gradient(135deg,rgba(232,0,45,0.25),rgba(232,0,45,0.12));border:1px solid rgba(232,0,45,0.3);color:#fff;box-shadow:0 4px 20px rgba(232,0,45,0.15)}
.nav-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-text{transition:opacity .25s,width .25s;overflow:hidden}
.sidebar.collapsed .nav-text{opacity:0;width:0}
.sidebar.collapsed .nav-item{justify-content:center;padding:9px}
.sidebar-footer{margin-top:auto;padding:12px 10px;border-top:1px solid var(--glass-border);display:flex;align-items:center;gap:10px;overflow:hidden}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--red),#ff4d6d);box-shadow:0 0 12px rgba(232,0,45,0.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1;overflow:hidden;min-width:0;transition:opacity .25s}
.user-email{font-size:11px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-status{font-size:10px;color:var(--green)}
.sidebar.collapsed .user-info{opacity:0;width:0}
.logout-btn{color:var(--text-3);flex-shrink:0;padding:4px;border-radius:6px;transition:color .15s}
.logout-btn:hover{color:var(--red)}
.sidebar.collapsed .logout-btn{display:none}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:16px;flex-shrink:0;height:60px;background:var(--topbar-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border)}
.topbar-title{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,var(--text-1) 40%,var(--text-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme="light"] .topbar-title{background:linear-gradient(135deg,#0A0A12 40%,rgba(10,10,18,0.55));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-sub{font-size:12px;color:var(--text-2)}
.topbar-right{display:flex;align-items:center;gap:8px}
.theme-btn{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--glass-bg);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:all .15s}
.theme-btn:hover{background:var(--glass-bg-2);color:var(--text-1)}
.content{flex:1;overflow-y:auto;padding:24px 28px 48px;display:flex;flex-direction:column;gap:18px}

/* GLASS CARD */
.gc{background:var(--glass-bg);backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);border-radius:var(--radius);position:relative;overflow:hidden}
.gc::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.14),transparent);pointer-events:none}

/* BUTTONS */
.cx-refresh-btn{display:flex;align-items:center;gap:7px;padding:8px 18px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--red),#c8001f);font-size:12px;font-weight:600;color:#fff;box-shadow:0 4px 20px var(--red-glow);transition:all .18s}
.cx-refresh-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--red-glow)}
.cx-filter-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);background:var(--glass-bg);border:1px solid var(--glass-border);font-size:12px;font-weight:500;color:var(--text-2);transition:all .15s}
.cx-filter-btn:hover{background:var(--glass-bg-2);color:var(--text-1)}
.cx-select{padding:7px 12px;border-radius:var(--radius-sm);background:var(--glass-bg);border:1px solid var(--glass-border);color:var(--text-2);font-size:12px;font-family:inherit;outline:none;appearance:none}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(232,0,45,0.4)}50%{box-shadow:0 0 0 8px rgba(232,0,45,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.cx-spinner{width:20px;height:20px;border-radius:50%;border:2px solid rgba(232,0,45,0.2);border-top-color:var(--red);animation:spin .8s linear infinite}

/* BADGE helpers */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.badge-red{background:rgba(232,0,45,0.15);color:var(--red);border:1px solid rgba(232,0,45,0.25)}
.badge-green{background:rgba(0,214,143,0.12);color:var(--green);border:1px solid rgba(0,214,143,0.2)}
.badge-cyan{background:rgba(0,194,255,0.12);color:var(--cyan);border:1px solid rgba(0,194,255,0.2)}
.badge-yellow{background:rgba(255,184,0,0.12);color:var(--yellow);border:1px solid rgba(255,184,0,0.2)}
.badge-purple{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.2)}
.badge-gray{background:rgba(255,255,255,0.06);color:var(--text-3);border:1px solid var(--glass-border)}

/* TABLE */
.cx-table{width:100%;border-collapse:separate;border-spacing:0}
.cx-table th{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text-3);padding:10px 14px;border-bottom:1px solid var(--glass-border);text-align:left;white-space:nowrap}
.cx-table td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;color:var(--text-2);vertical-align:middle}
.cx-table tr:last-child td{border-bottom:none}
.cx-table tbody tr{transition:background .12s;cursor:pointer}
.cx-table tbody tr:hover td{background:rgba(255,255,255,0.03);color:var(--text-1)}
.mono{font-family:'JetBrains Mono',monospace}

/* ── PAGE-SPECIFIC PREVIEWS ── */
/* LEADS */
.leads-layout{display:flex;gap:0;height:100%;overflow:hidden}
.leads-listpanel{width:220px;min-width:220px;border-right:1px solid var(--glass-border);display:flex;flex-direction:column;overflow:hidden;background:rgba(0,0,0,0.15)}
.leads-listpanel-header{padding:14px 14px 10px;border-bottom:1px solid var(--glass-border)}
.leads-list-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;transition:background .12s;font-size:13px;color:var(--text-2);gap:8px}
.leads-list-item:hover{background:var(--glass-bg-2);color:var(--text-1)}
.leads-list-item.active{background:var(--red-lo);border-left:2px solid var(--red);color:var(--text-1)}
.leads-main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* CALLS */
.calls-drawer{position:absolute;top:0;right:0;bottom:0;width:420px;background:rgba(6,6,8,0.97);backdrop-filter:blur(20px);border-left:1px solid var(--glass-border);display:flex;flex-direction:column;overflow:hidden;z-index:10}
.calls-drawer-header{padding:18px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between}

/* QUEUES - Campaign card */
.campaign-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.campaign-card{padding:20px}
.campaign-card::after{content:'';position:absolute;inset:0;border-radius:var(--radius);background:radial-gradient(ellipse 60% 50% at 100% 0%,rgba(232,0,45,0.07),transparent 60%);pointer-events:none}
.progress-ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.progress-ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);filter:drop-shadow(0 0 8px rgba(232,0,45,0.3))}
.progress-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;font-family:'JetBrains Mono',monospace;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ASSISTANTS */
.assistant-cards{display:flex;flex-direction:column;gap:12px}
.assistant-card-header{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;transition:background .15s}
.assistant-card-header:hover{background:rgba(255,255,255,0.02)}
.assistant-bot-icon{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,rgba(232,0,45,0.22),rgba(232,0,45,0.1));border:1px solid rgba(232,0,45,0.3);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,0,45,0.18);flex-shrink:0}
.assistant-expanded{border-top:1px solid var(--glass-border);padding:20px;display:flex;flex-direction:column;gap:14px}
.cx-form-label{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text-3);margin-bottom:5px;display:block}
.cx-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);background:var(--glass-bg-2);border:1px solid var(--glass-border);color:var(--text-1);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.cx-input:focus{border-color:rgba(232,0,45,0.4)}
.cx-textarea{width:100%;padding:10px 14px;border-radius:var(--radius-sm);background:var(--glass-bg-2);border:1px solid var(--glass-border);color:var(--text-1);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;resize:vertical;transition:border-color .15s;min-height:120px}
.cx-textarea:focus{border-color:rgba(232,0,45,0.4)}

/* MEMBERS */
.member-cards{display:flex;flex-direction:column;gap:10px}
.member-card{padding:16px 20px;display:flex;align-items:center;gap:16px}
.member-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-owner{background:linear-gradient(135deg,var(--red),#ff4d6d);box-shadow:0 0 16px rgba(232,0,45,0.4);color:#fff}
.av-admin{background:rgba(0,194,255,0.2);border:1px solid rgba(0,194,255,0.3);color:var(--cyan)}
.av-member{background:var(--glass-bg-2);border:1px solid var(--glass-border);color:var(--text-2)}

/* SETTINGS / VAPI */
.settings-section{padding:24px}
.settings-section-title{font-size:13px;font-weight:700;color:var(--text-1);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.settings-section-sub{font-size:11px;color:var(--text-3);margin-bottom:18px}
.settings-divider{height:1px;background:var(--glass-border);margin:0 0 18px}
.cx-key-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);background:var(--glass-bg-2);border:1px solid var(--glass-border);color:var(--text-1);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s}
.cx-key-input:focus{border-color:rgba(232,0,45,0.4)}
.minutes-track{flex:1;height:7px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden}
.minutes-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--red),#ff4d6d);box-shadow:0 0 16px rgba(232,0,45,0.5);transition:width 1.2s var(--ease)}

/* PAGE NAV */
.page-nav{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.page-nav-btn{padding:7px 14px;border-radius:var(--radius-sm);background:var(--glass-bg);border:1px solid var(--glass-border);font-size:12px;font-weight:500;color:var(--text-2);transition:all .15s;cursor:pointer}
.page-nav-btn:hover{background:var(--glass-bg-2);color:var(--text-1)}
.page-nav-btn.active{background:var(--red-lo);border-color:rgba(232,0,45,0.35);color:var(--red)}
</style>
</head>

const pageMeta = {
  analytics:{title:'Analytics',sub:'Performance das campanhas de discagem'},
  leads:{title:'Lista de Leads',sub:'Gerencie suas listas de contatos e importações'},
  queues:{title:'Campanhas',sub:'Gerencie e monitore suas campanhas de discagem'},
  calls:{title:'Chamadas',sub:'Histórico detalhado de todas as chamadas realizadas'},
  assistants:{title:'Assistentes',sub:'Edite o prompt e configurações dos seus agentes de voz'},
  members:{title:'Membros',sub:'Gerencie quem tem acesso a esta organização'},
  vapi:{title:'Configurações',sub:'Gerencie sua conexão Vapi e configurações de uso'},
};

let current = 'analytics';

function navigate(page) {
  current = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('pageTitle').textContent = pageMeta[page].title;
  document.getElementById('pageSub').textContent = pageMeta[page].sub;
  document.getElementById('pageContent').innerHTML = pages[page].render();
  // Animate fills
  setTimeout(() => {
    const mf = document.getElementById('mf');
    if (mf) mf.style.width = '70%';
    const sf = document.querySelector('#settingsMf .minutes-fill');
    if (sf) sf.style.width = '70%';
  }, 100);
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', (e) => { e.preventDefault(); navigate(el.dataset.page); });
});

document.getElementById('toggleBtn').addEventListener('click', () =>
  document.getElementById('sidebar').classList.toggle('collapsed'));

const html = document.documentElement;
const ico = document.getElementById('themeIco');
const moon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
const sun = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
document.getElementById('themeBtn').addEventListener('click', () => {
  const dark = html.dataset.theme === 'dark';
  html.dataset.theme = dark ? 'light' : 'dark';
  ico.innerHTML = dark ? moon : sun;
});

navigate('analytics');
</script>
