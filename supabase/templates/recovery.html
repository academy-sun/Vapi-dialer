<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0D0D0D; color: #FFFFFF; padding: 40px; margin: 0; }
    .container { max-width: 500px; margin: 0 auto; background: #111111; padding: 40px; border-radius: 16px; border: 1px solid #222222; text-align: center; }
    .logo { margin-bottom: 30px; }
    .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    .text { font-size: 15px; color: #999999; line-height: 1.5; margin-bottom: 30px; }
    .button { display: inline-block; background-color: #FF1A1A; color: white; padding: 14px 24px; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .footer { margin-top: 30px; font-size: 12px; color: #555555; }
    .call { font-weight: 700; color: #FFFFFF; letter-spacing: -1px; font-size: 28px; }
    .x { font-weight: 700; color: #FF1A1A; letter-spacing: -1px; font-size: 32px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span class="call">CALL</span><span class="x">X</span>
    </div>
    
    <div class="title">Olá, {{ .Email }}</div>
    <div class="text">
      Recebemos um pedido para redefinir a senha da sua conta na MX3 Call X.
      <br><br>
      Para continuar e escolher uma nova senha, clique no botão abaixo:
    </div>
    
    <a href="{{ .ConfirmationURL }}" class="button">Redefinir minha senha</a>
    
    <div class="footer">
      Se você não solicitou essa redefinição, apenas ignore este e-mail.
      <br><br>
      © MX3 Call X
    </div>
  </div>
</body>
</html>
